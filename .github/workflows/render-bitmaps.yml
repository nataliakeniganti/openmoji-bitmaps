name: Render bitmaps

on:
  push:
    branches:
      - master
    paths:
      - openmoji-release.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert_svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          ref: refs/heads/master
          path: repo

      - name: Read version
        # Trims whitespace/newlines and avoids hyphens in variable names
        run: echo "OPENMOJI_VERSION=$(cat repo/openmoji-release.txt | xargs)" >> $GITHUB_ENV

      - name: Checkout OpenMoji repo
        uses: actions/checkout@v4
        with:
          repository: hfg-gmuend/openmoji
          ref: refs/tags/${{ env.OPENMOJI_VERSION }}
          path: openmoji
          sparse-checkout: color/svg

      - name: Speedup APT package installation
        uses: abbbi/github-actions-tune@v1

      - name: Convert SVGs to 128x128 PNG32
        id: conv-128x128
        uses: ./repo/.github/actions/svg2png32
        with:
          svg_dir: openmoji/color/svg
          output_path: repo

      - name: Generate 128x128 PNG8
        uses: ./repo/.github/actions/png8quantize
        with:
          source_dir: ${{ steps.conv-128x128.outputs.png_dir }}
          output_dir: repo/128x128_png8

      - name: Commit and Tag
        working-directory: repo
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -am "Generate OpenMoji ${{ env.OPENMOJI_VERSION }}" || echo "No changes to commit"
          git tag -f "${{ env.OPENMOJI_VERSION }}"
          git push origin master
          git push --force origin "refs/tags/${{ env.OPENMOJI_VERSION }}"

      - name: Create a release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use 7z on the directory context to avoid shell argument limits
          7z a -tzip "128x128_PNG32.zip" "./${{ steps.conv-128x128.outputs.png_dir }}/"
          7z a -tzip "128x128_PNG8.zip" "./repo/128x128_png8/"
          
          # Delete existing release if it exists
          gh release delete "${{ env.OPENMOJI_VERSION }}" -y --repo "$GITHUB_REPOSITORY" || true
          
          # Create new release with assets
          gh release create "${{ env.OPENMOJI_VERSION }}" \
            "128x128_PNG32.zip#128x128 PNG32" \
            "128x128_PNG8.zip#128x128 PNG8" \
            --repo "$GITHUB_REPOSITORY" \
            --title "OpenMoji ${{ env.OPENMOJI_VERSION }}" \
            --notes "Release notes: https://github.com/hfg-gmuend/openmoji/releases/tag/${{ env.OPENMOJI_VERSION }}"
