name: Check OpenMoji release

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release_version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_KEY }}
          # Changed to master to match your other workflow
          ref: master
          sparse-checkout: openmoji-release.txt
          sparse-checkout-cone-mode: false

      - name: Fetch OpenMoji latest release version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Added GITHUB_TOKEN to the header to avoid API rate limits
          curl -s -L -H "Authorization: Bearer $GITHUB_TOKEN" \
          'https://api.github.com/repos/hfg-gmuend/openmoji/releases/latest' | \
          jq -r '.tag_name' > openmoji-release.txt

      - name: Check if it is a new release
        id: git-check
        run: |
          # Improved detection: checks if the file actually changed
          git diff --quiet openmoji-release.txt || echo "modified=true" >> $GITHUB_OUTPUT

      - name: Commit latest release version
        if: steps.git-check.outputs.modified == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add openmoji-release.txt
          # Using xargs to trim any weird whitespace from the file for the message
          VERSION=$(cat openmoji-release.txt | xargs)
          git commit -m "Update openmoji-release.txt ($VERSION)"
          git push origin master
